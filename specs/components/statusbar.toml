# Component: statusbar
# One-line status bar. Composition anchor: demonstrates how a component
# references elements via [[compose]] blocks and wires params through.

[component]
name = "statusbar"
kind = "component"
description = "Single-line status bar. Optionally combines a spinner on the left, a progress bar in the middle, and a percentage readout on the right."
targets = ["ratatui"]

[params.label]
type = "string"
default = "Working"
doc = "Leading label text."

[params.percent]
type = "float"
range = [0.0, 1.0]
default = 0.0
doc = "Shared fill fraction passed to progress and percentage children."

[params.width]
type = "int"
min = 10
default = 60
doc = "Total bar width in cells."

[params.show_spinner]
type = "bool"
default = false

[params.show_progress]
type = "bool"
default = true

[params.show_percent]
type = "bool"
default = true

[classes]
label = "primary"
frame = "border"

[[compose]]
element = "spinner"
slot = "left"
when = "show_spinner"

[[compose]]
element = "progress"
slot = "center"
when = "show_progress"
# Pass expressions: ${name} refers to the parent's params. Width math lets
# progress fill whatever room remains after the label and optional readouts.
pass = { percent = "${percent}", width = "${width - 20}", style = "unicode" }

[[compose]]
element = "percentage"
slot = "right"
when = "show_percent"
pass = { value = "${percent}" }
